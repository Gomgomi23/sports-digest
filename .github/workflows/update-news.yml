name: Update News Dashboard

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 서버에서 자동 갱신 (api.github.com 트리거 불필요)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Collect news and update dashboard
        run: python scripts/update_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update news $(date +%Y-%m-%d)"
          # 다른 실행이 먼저 push해 remote가 앞설 수 있으므로 rebase(생성 데이터 우선) 후 재시도
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort || true; sleep $((RANDOM % 5 + 3)); continue; }
            git push origin main && { echo "pushed on attempt $i"; exit 0; }
            sleep $((RANDOM % 5 + 3))
          done
          echo "push failed after 5 attempts" >&2; exit 1
