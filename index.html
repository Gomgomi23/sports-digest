<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTS DIGEST — 스포츠 산업 뉴스 브리핑</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    /* ── BMW M design system ───────────────────────────────────
       Near-black canvas · white heavy display / light body ·
       M tricolor stripe as the sole decorative signature · radius 0 */
    :root {
      --canvas:#000; --surface-soft:#0d0d0d; --surface-card:#1a1a1a; --surface-elev:#262626;
      --ink:#fff; --body:#bbbbbb; --body-strong:#e6e6e6; --muted:#7e7e7e;
      --hairline:#3c3c3c;
      --m-blue-light:#0066b1; --m-blue-dark:#1c69d4; --m-red:#e22718;
    }
    html,body{ background:var(--canvas); }
    body{
      font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      color:var(--body); -webkit-font-smoothing:antialiased;
    }
    /* heavy display vs. light body — the editorial signature */
    .display{ font-weight:700; letter-spacing:-.01em; color:var(--ink); }
    .body-light{ font-weight:300; }
    /* machined uppercase labels */
    .label-m{ text-transform:uppercase; letter-spacing:1.5px; font-weight:700; }
    /* the M tricolor stripe — brand identity only, never a CTA */
    .m-stripe{
      height:4px; width:100%;
      background:linear-gradient(90deg,
        var(--m-blue-light) 0 33.33%, var(--m-blue-dark) 33.33% 66.66%, var(--m-red) 66.66% 100%);
    }
    .m-stripe-sm{ height:3px; width:44px;
      background:linear-gradient(90deg,
        var(--m-blue-light) 0 33.33%, var(--m-blue-dark) 33.33% 66.66%, var(--m-red) 66.66% 100%);
    }
    ::selection{ background:var(--m-red); color:#fff; }
    /* thin scrollbar on tab strip */
    .noscroll::-webkit-scrollbar{ height:0; }
  </style>
</head>
<body class="min-h-screen">

  <!-- PAT 미설정 안내 배너 (최초 1회) -->
  <div id="setup-banner" class="hidden bg-[#0d0d0d] border-b border-[#3c3c3c] px-4 py-2.5">
    <div class="max-w-4xl mx-auto flex items-center justify-between gap-3 text-sm">
      <p class="text-[#bbbbbb] body-light">GitHub PAT를 설정하면 접속할 때마다 자동으로 최신 뉴스를 수집합니다.</p>
      <button onclick="showTokenPanel()" class="shrink-0 label-m text-[11px] text-white hover:text-[#e22718] transition-colors whitespace-nowrap">설정하기</button>
    </div>
  </div>

  <!-- PAT 입력 패널 -->
  <div id="token-panel" class="hidden bg-[#0d0d0d] border-b border-[#3c3c3c] px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center gap-2">
      <label class="label-m text-[11px] text-[#7e7e7e] whitespace-nowrap">GitHub PAT</label>
      <input id="token-input" type="password" placeholder="ghp_... (Actions: Read and write 권한 포함)"
        class="flex-1 text-sm bg-[#1a1a1a] text-white border border-[#3c3c3c] rounded-none px-3 py-2 body-light placeholder:text-[#7e7e7e] focus:outline-none focus:border-white transition-colors"
        onkeydown="if(event.key==='Enter') saveToken()" />
      <button onclick="saveToken()" class="px-4 py-2 border border-white text-white label-m text-[11px] rounded-none hover:bg-white hover:text-black transition-colors">저장</button>
      <button onclick="hideTokenPanel()" class="px-3 py-2 text-[#7e7e7e] label-m text-[11px] hover:text-white transition-colors">취소</button>
    </div>
  </div>

  <header class="bg-black border-b border-[#3c3c3c] sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 pt-5 pb-0">
      <div class="flex items-start justify-between mb-4">
        <div class="min-w-0">
          <div class="flex items-center gap-3 mb-1.5">
            <div class="m-stripe-sm"></div>
            <span class="label-m text-[11px] text-[#7e7e7e]">Sports Industry Intelligence</span>
          </div>
          <h1 class="display text-2xl sm:text-[28px] leading-none">스포츠 산업 뉴스 브리핑</h1>
          <p id="updated-at" class="text-[11px] text-[#7e7e7e] mt-1.5 body-light"></p>
        </div>
        <div class="flex items-center gap-3 shrink-0 pt-1">
          <span id="article-count" class="label-m text-[11px] text-[#7e7e7e]"></span>

          <!-- GitHub Actions 실행 중 표시 -->
          <span id="dispatch-status" class="hidden label-m text-[10px] text-[#e22718] flex items-center gap-1">
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            수집 중
          </span>

          <!-- 폴링 스피너 -->
          <span id="sync-status" class="hidden label-m text-[10px] text-[#1c69d4] flex items-center gap-1">
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            업데이트 중
          </span>

          <!-- 수동 새로고침 버튼 -->
          <button onclick="manualRefresh()" title="지금 업데이트"
            class="text-[#7e7e7e] hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>

          <!-- PAT 설정 버튼 -->
          <button onclick="toggleTokenPanel()" title="GitHub PAT 설정"
            class="text-[#7e7e7e] hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- 카테고리 탭: 언더라인형(대문자 트래킹), 필 제거 -->
      <div class="flex gap-6 overflow-x-auto noscroll">
        <button onclick="filterCategory('전체')" data-cat="전체"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-white border-white">
          전체
        </button>
        <button onclick="filterCategory('스포츠 중계권')" data-cat="스포츠 중계권"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          중계권
        </button>
        <button onclick="filterCategory('스포츠 OTT')" data-cat="스포츠 OTT"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          OTT
        </button>
        <button onclick="filterCategory('스포츠 스타트업')" data-cat="스포츠 스타트업"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          스타트업
        </button>
        <button onclick="filterCategory('스포츠 기술')" data-cat="스포츠 기술"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          기술
        </button>
        <button onclick="filterCategory('스포츠 데이터')" data-cat="스포츠 데이터"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          데이터
        </button>
        <button onclick="filterCategory('스포츠 VR/AR')" data-cat="스포츠 VR/AR"
          class="tab label-m text-[12px] whitespace-nowrap pb-3 border-b-2 transition-colors text-[#7e7e7e] border-transparent hover:text-white">
          VR/AR
        </button>
      </div>
    </div>
    <!-- M 시그니처 스트라이프 -->
    <div class="m-stripe"></div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <div id="digest-section"></div>
    <div id="articles-container" class="hidden space-y-4"></div>
    <div id="empty-state" class="hidden text-center py-24 text-[#7e7e7e]">
      <svg class="w-12 h-12 mx-auto mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
      </svg>
      <p class="label-m text-sm text-[#bbbbbb]">아직 뉴스가 없습니다</p>
      <p class="text-sm mt-1 body-light">다음 브리핑을 기다려주세요</p>
    </div>
  </main>

  <footer class="border-t border-[#3c3c3c] mt-8">
    <div class="max-w-4xl mx-auto px-4 py-10">
      <div class="m-stripe-sm mb-4"></div>
      <p class="display text-sm">SPORTS DIGEST</p>
      <p class="text-[11px] text-[#7e7e7e] mt-1.5 body-light leading-relaxed">
        스포츠 산업 일일 인텔리전스 · Anchor Corp.<br>
        AI가 수집·정리한 정보이며, 투자·비즈니스 결정 시 원문 확인을 권장합니다.
      </p>
    </div>
  </footer>

  <script>
    const REPO     = 'Gomgomi23/sports-digest';
    const WORKFLOW = 'update-news.yml';
    const STALE_MS = 30 * 60 * 1000;   // 30분 경과 시 stale 판정
    const POLL_MS  = 5  * 60 * 1000;   // 5분마다 폴링

    // BMW M: 색상은 브랜드 트라이컬러만. 카테고리는 대문자 라벨 + M-red 마커로 통일.
    const CATEGORY_LABEL = {
      '스포츠 중계권':  'RIGHTS',
      '스포츠 OTT':     'OTT',
      '스포츠 스타트업':'STARTUP',
      '스포츠 기술':    'TECH',
      '스포츠 데이터':  'DATA',
      '스포츠 VR/AR':   'VR/AR',
    };

    let allArticles      = [];
    let lastUpdatedAt    = '';
    let currentCategory  = '전체';
    let dispatchPending  = false;

    // ── PAT 관리 ───────────────────────────────────────────────
    const getToken = () => localStorage.getItem('gh_pat') || '';
    const storeToken = t => localStorage.setItem('gh_pat', t.trim());

    function showTokenPanel() {
      document.getElementById('setup-banner').classList.add('hidden');
      document.getElementById('token-panel').classList.remove('hidden');
      const inp = document.getElementById('token-input');
      inp.value = getToken();
      inp.focus();
    }
    function hideTokenPanel() {
      document.getElementById('token-panel').classList.add('hidden');
    }
    function toggleTokenPanel() {
      const panel = document.getElementById('token-panel');
      if (panel.classList.contains('hidden')) showTokenPanel();
      else hideTokenPanel();
    }
    function saveToken() {
      const val = document.getElementById('token-input').value.trim();
      storeToken(val);
      hideTokenPanel();
      if (val) {
        document.getElementById('setup-banner').classList.add('hidden');
        manualRefresh();
      }
    }

    // ── GitHub Actions 트리거 ──────────────────────────────────
    function isStale(updatedAtStr) {
      if (!updatedAtStr) return true;
      const m = updatedAtStr.match(/(\d{4}-\d{2}-\d{2} \d{2}:\d{2})/);
      if (!m) return true;
      const d = new Date(m[1].replace(' ', 'T') + '+09:00');
      return Date.now() - d.getTime() > STALE_MS;
    }

    async function triggerWorkflow() {
      const token = getToken();
      if (!token || dispatchPending) return;
      dispatchPending = true;
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ ref: 'main' }),
          }
        );
        if (res.status === 204) {
          document.getElementById('dispatch-status').classList.remove('hidden');
        } else {
          dispatchPending = false;
        }
      } catch {
        dispatchPending = false;
      }
    }

    async function manualRefresh() {
      dispatchPending = false;
      await triggerWorkflow();
    }

    // ── 뉴스 로드 & 폴링 ───────────────────────────────────────
    const RAW_URL = 'https://gomgomi23.github.io/sports-digest/data/news.json';

    async function loadNews(silent = false) {
      if (!silent) document.getElementById('sync-status').classList.remove('hidden');
      try {
        // 수집 대기 중에는 GitHub 원본을 직접 폴링 (로컬 파일은 갱신 안 됨)
        const url = dispatchPending
          ? RAW_URL + '?t=' + Date.now()
          : 'data/news.json?t=' + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const data = await res.json();

        const isNew = data.updated_at && data.updated_at !== lastUpdatedAt;
        if (isNew || !silent) {
          if (isNew && dispatchPending) {
            document.getElementById('dispatch-status').classList.add('hidden');
            dispatchPending = false;
          }
          lastUpdatedAt = data.updated_at || '';
          allArticles   = data.articles   || [];
          if (data.updated_at)
            document.getElementById('updated-at').textContent = '마지막 업데이트: ' + data.updated_at;
          if (currentCategory !== '전체') {
            render(allArticles.filter(a => a.category === currentCategory));
          }
        }

        // 접속 시 stale이면 자동 수집 트리거
        if (!dispatchPending && isStale(data.updated_at)) triggerWorkflow();

      } catch {
        if (!silent) showEmpty();
      } finally {
        document.getElementById('sync-status').classList.add('hidden');
      }
    }

    // 평상시 5분 폴링 + 수집 대기 중엔 추가로 30초마다 체크
    setInterval(() => loadNews(true), POLL_MS);
    setInterval(() => { if (dispatchPending) loadNews(true); }, 30_000);

    // ── 카테고리 필터 ──────────────────────────────────────────
    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.tab').forEach(btn => {
        const active = btn.dataset.cat === cat;
        btn.classList.toggle('text-white',       active);
        btn.classList.toggle('border-white',      active);
        btn.classList.toggle('text-[#7e7e7e]',    !active);
        btn.classList.toggle('border-transparent',!active);
      });
      if (cat === '전체') {
        document.getElementById('digest-section').classList.remove('hidden');
        document.getElementById('articles-container').classList.add('hidden');
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('article-count').textContent = '';
      } else {
        document.getElementById('digest-section').classList.add('hidden');
        document.getElementById('articles-container').classList.remove('hidden');
        render(allArticles.filter(a => a.category === cat));
      }
    }

    // ── 중복 그룹핑 ───────────────────────────────────────────
    const STOPS = new Set([
      '스포츠','기술','데이터','개최','위한','공동','관련','이후','대한',
      '하는','위해','통해','뉴스','대회','경기','선수','구단','리그','한국',
      '세계','올해','올해의','이번','지난','통해서','통한','대규모',
    ]);

    function extractKeywords(title) {
      // 한글 3자 이상, 영문 4자 이상 단어 추출 후 불용어 제거
      return (title.match(/[가-힣]{3,}|[A-Za-z]{4,}/g) || [])
        .filter(w => !STOPS.has(w));
    }

    function groupArticles(articles) {
      const groups  = [];
      const groupKw = []; // 각 그룹의 키워드 합집합 (Set)

      for (const a of articles) {
        const kw = extractKeywords(a.title);
        let matched = -1;

        for (let i = 0; i < groups.length; i++) {
          if (groups[i].main.category !== a.category) continue;
          const overlap = kw.filter(w => groupKw[i].has(w)).length;
          if (overlap >= 2) { matched = i; break; }
        }

        if (matched >= 0) {
          groups[matched].related.push(a);
          kw.forEach(w => groupKw[matched].add(w));
        } else {
          groups.push({ main: a, related: [] });
          groupKw.push(new Set(kw));
        }
      }
      return groups;
    }

    // ── 렌더링 ────────────────────────────────────────────────
    // BMW M 카드: surface-card(#1a1a1a) · radius 0 · 그림자 없음 · hover 시 흰 테두리
    function catLabel(cat) {
      return CATEGORY_LABEL[cat] || (cat || '').replace(/^스포츠\s*/, '').toUpperCase();
    }

    function render(articles) {
      const container = document.getElementById('articles-container');
      const empty     = document.getElementById('empty-state');

      if (!articles.length) { container.innerHTML = ''; showEmpty(); return; }
      empty.classList.add('hidden');

      const groups = groupArticles(articles);
      document.getElementById('article-count').textContent = '총 ' + groups.length + '건';

      container.innerHTML = groups.map(({ main: a, related }) => `
        <article class="bg-[#1a1a1a] border border-[#3c3c3c] p-5 hover:border-white transition-colors">
          <div class="flex items-start gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-3 mb-2.5">
                <span class="flex items-center gap-1.5 label-m text-[10px] text-white">
                  <span class="inline-block w-2 h-2 bg-[#e22718]"></span>${escHtml(catLabel(a.category))}
                </span>
                ${a.source ? `<span class="text-[11px] text-[#7e7e7e] body-light">${fmtSource(a.source)}</span>` : ''}
                ${a.date   ? `<span class="text-[11px] text-[#7e7e7e] body-light">${escHtml(a.date)}</span>`   : ''}
              </div>
              <a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer"
                class="block text-[16px] font-bold text-white hover:text-[#bbbbbb] leading-snug transition-colors">
                ${escHtml(a.title)}
              </a>
              ${related.length ? `
              <div class="mt-3 pt-3 border-t border-[#3c3c3c] space-y-1.5">
                ${related.map(r => `
                  <a href="${escHtml(r.url)}" target="_blank" rel="noopener noreferrer"
                    class="flex items-center gap-2 text-xs text-[#7e7e7e] hover:text-white transition-colors">
                    <span class="shrink-0 w-1 h-1 bg-[#7e7e7e]"></span>
                    <span class="body-light">${fmtSource(r.source || '관련기사')} — ${escHtml(r.title)}</span>
                  </a>
                `).join('')}
              </div>` : ''}
            </div>
            <a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer"
              class="shrink-0 text-[#7e7e7e] hover:text-white transition-colors mt-0.5" title="원문 보기">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>
          </div>
        </article>
      `).join('');
    }

    function showEmpty() {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('article-count').textContent = '총 0건';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const SOURCE_ALIAS = {
      'v.daum.net': '다음',
      'V.DAUM.NET': '다음',
    };
    function fmtSource(src) {
      return escHtml(SOURCE_ALIAS[src] || SOURCE_ALIAS[src?.toLowerCase()] || src || '');
    }

    // ── 다이제스트 ────────────────────────────────────────────
    // 순위 마커 = M 트라이컬러 (1위 red · 2위 dark-blue · 3위 light-blue)
    const RANK_COLOR = ['#e22718', '#1c69d4', '#0066b1'];

    function parseBold(text) {
      return String(text)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="text-white font-bold">$1</strong>');
    }

    function sectionHead(title) {
      return `<div class="flex items-center gap-3 mb-4 mt-8">
        <div class="m-stripe-sm"></div>
        <h3 class="display text-[16px]">${escHtml(title)}</h3>
      </div>`;
    }

    function renderDigest(d) {
      if (!d || !d.date || d.date === '준비 중' || !d.top3 || !d.top3.length) return;

      const top3Html = (d.top3 || []).map((item, i) => `
        <div class="pl-4 py-1" style="border-left:4px solid ${RANK_COLOR[i] || '#7e7e7e'}">
          <div class="text-[14px] font-bold mb-1.5 leading-snug" style="color:${RANK_COLOR[i] || '#e6e6e6'}">
            ${item.url
              ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener" class="hover:underline"><span class="label-m text-[11px]">No.${item.rank}</span>&nbsp;&nbsp;${escHtml(item.title)}</a>`
              : `<span class="label-m text-[11px]">No.${item.rank}</span>&nbsp;&nbsp;${escHtml(item.title)}`}
          </div>
          <p class="text-[13.5px] text-[#bbbbbb] leading-relaxed body-light">${escHtml(item.body)}</p>
        </div>`).join('');

      const sectionsHtml = (d.sections || []).map(sec => {
        const subHtml = (sec.subsections || []).map(sub => `
          ${sub.title ? `<div class="label-m text-[11px] text-[#1c69d4] mt-4 mb-2">${escHtml(sub.title)}</div>` : ''}
          <ul class="space-y-2.5">
            ${(sub.items || []).map(item => {
              const text = typeof item === 'object' ? item.text : item;
              const url  = typeof item === 'object' ? item.url  : null;
              return `<li class="text-[13.5px] text-[#bbbbbb] leading-relaxed flex gap-2.5 body-light">
                <span class="text-[#e22718] shrink-0 select-none mt-1.5"><span class="inline-block w-1.5 h-1.5 bg-[#e22718]"></span></span>
                <span>${parseBold(text)}${url ? ` <a href="${escHtml(url)}" target="_blank" rel="noopener" class="text-[#7e7e7e] hover:text-white text-xs ml-0.5">↗</a>` : ''}</span>
              </li>`;
            }).join('')}
          </ul>`).join('');
        return `<div>${sectionHead(sec.title)}${subHtml}</div>`;
      }).join('');

      const mediaTypeLabel = { 'YouTube': 'YOUTUBE', '블로그': 'BLOG', '리서치': 'RESEARCH' };
      const mediaHtml = d.media && d.media.length ? `
        <div>${sectionHead('추천 유튜브 & 블로그')}
          <div class="space-y-3.5">
            ${d.media.map(m => `
              <div class="flex gap-3 items-start text-sm">
                <span class="shrink-0 label-m text-[10px] text-[#bbbbbb] border border-[#3c3c3c] px-2 py-1 whitespace-nowrap mt-0.5">${escHtml(mediaTypeLabel[m.type] || (m.type||'').toUpperCase())}</span>
                <div>
                  <div class="font-bold text-white text-[14px]">
                    ${m.url
                      ? `<a href="${escHtml(m.url)}" target="_blank" rel="noopener" class="hover:text-[#bbbbbb] transition-colors">${escHtml(m.title)}</a>`
                      : escHtml(m.title)}
                  </div>
                  <div class="text-[#7e7e7e] text-xs mt-0.5 body-light">${escHtml(m.description)}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>` : '';

      document.getElementById('digest-section').innerHTML = `
        <div class="bg-[#0d0d0d] border border-[#3c3c3c] p-6 sm:p-8 mb-8">
          <div class="mb-7">
            <div class="m-stripe-sm mb-3"></div>
            <h2 class="display text-[26px] sm:text-[32px] leading-none">스포츠 산업 일일 다이제스트</h2>
            <p class="label-m text-[11px] text-[#7e7e7e] mt-2.5">${escHtml(d.date)} · Sports Industry Intelligence</p>
          </div>
          ${top3Html.length ? `
            <div>${sectionHead('오늘의 주요 뉴스 TOP 3')}
              <div class="space-y-5">${top3Html}</div>
            </div>` : ''}
          ${sectionsHtml}
          ${mediaHtml}
          <div class="mt-8 pt-5 border-t border-[#3c3c3c] text-[11px] text-[#7e7e7e] body-light leading-relaxed">
            스포츠 산업 일일 다이제스트 · ${escHtml(d.date)} · Anchor Corp.<br>
            본 다이제스트는 AI가 수집·정리한 정보이며, 투자·비즈니스 결정 시 원문 확인을 권장합니다.
          </div>
        </div>`;
    }

    async function loadDigest() {
      try {
        const res = await fetch('data/digest.json?t=' + Date.now());
        if (!res.ok) return;
        renderDigest(await res.json());
      } catch(e) { /* 다이제스트는 선택적 */ }
    }

    // ── 초기화 ────────────────────────────────────────────────
    if (!getToken()) document.getElementById('setup-banner').classList.remove('hidden');
    loadDigest();
    loadNews();
  </script>
</body>
</html>
