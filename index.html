<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스포츠 산업 뉴스 브리핑</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- PAT 미설정 안내 배너 (최초 1회) -->
  <div id="setup-banner" class="hidden bg-blue-50 border-b border-blue-200 px-4 py-2.5">
    <div class="max-w-4xl mx-auto flex items-center justify-between gap-3 text-sm">
      <p class="text-blue-700">GitHub PAT를 설정하면 접속할 때마다 자동으로 최신 뉴스를 수집합니다.</p>
      <button onclick="showTokenPanel()" class="shrink-0 text-blue-600 font-semibold hover:text-blue-800 underline whitespace-nowrap">설정하기</button>
    </div>
  </div>

  <!-- PAT 입력 패널 -->
  <div id="token-panel" class="hidden bg-white border-b border-gray-200 px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center gap-2">
      <label class="text-sm text-gray-500 whitespace-nowrap">GitHub PAT</label>
      <input id="token-input" type="password" placeholder="ghp_... (Actions: Read and write 권한 포함)"
        class="flex-1 text-sm border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        onkeydown="if(event.key==='Enter') saveToken()" />
      <button onclick="saveToken()" class="px-3 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">저장</button>
      <button onclick="hideTokenPanel()" class="px-3 py-2 text-gray-500 text-sm hover:text-gray-700">취소</button>
    </div>
  </div>

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h1 class="text-xl font-bold text-gray-900">스포츠 산업 뉴스 브리핑</h1>
          <p id="updated-at" class="text-xs text-gray-400 mt-0.5"></p>
        </div>
        <div class="flex items-center gap-2">
          <span id="article-count" class="text-sm text-gray-400"></span>

          <!-- GitHub Actions 실행 중 표시 -->
          <span id="dispatch-status" class="hidden text-xs text-orange-500 flex items-center gap-1">
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            수집 중
          </span>

          <!-- 폴링 스피너 -->
          <span id="sync-status" class="hidden text-xs text-blue-500 flex items-center gap-1">
            <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            업데이트 중
          </span>

          <!-- 수동 새로고침 버튼 -->
          <button onclick="manualRefresh()" title="지금 업데이트"
            class="text-gray-400 hover:text-blue-500 transition-colors p-1 rounded">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>

          <!-- PAT 설정 버튼 -->
          <button onclick="toggleTokenPanel()" title="GitHub PAT 설정"
            class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
        <button onclick="filterCategory('전체')" data-cat="전체"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-blue-600 text-white">
          전체
        </button>
        <button onclick="filterCategory('스포츠 중계권')" data-cat="스포츠 중계권"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          중계권
        </button>
        <button onclick="filterCategory('스포츠 OTT')" data-cat="스포츠 OTT"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          OTT
        </button>
        <button onclick="filterCategory('스포츠 스타트업')" data-cat="스포츠 스타트업"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          스타트업
        </button>
        <button onclick="filterCategory('스포츠 기술')" data-cat="스포츠 기술"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          기술
        </button>
        <button onclick="filterCategory('스포츠 데이터')" data-cat="스포츠 데이터"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          데이터
        </button>
        <button onclick="filterCategory('스포츠 VR/AR')" data-cat="스포츠 VR/AR"
          class="tab px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors bg-gray-100 text-gray-600 hover:bg-gray-200">
          VR/AR
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <div id="articles-container" class="space-y-3"></div>
    <div id="empty-state" class="hidden text-center py-24 text-gray-400">
      <svg class="w-12 h-12 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
      </svg>
      <p class="text-base font-medium">아직 뉴스가 없습니다</p>
      <p class="text-sm mt-1">다음 브리핑을 기다려주세요</p>
    </div>
  </main>

  <script>
    const REPO     = 'Gomgomi23/sports-digest';
    const WORKFLOW = 'update-news.yml';
    const STALE_MS = 30 * 60 * 1000;   // 30분 경과 시 stale 판정
    const POLL_MS  = 5  * 60 * 1000;   // 5분마다 폴링

    const CATEGORY_BADGE = {
      '스포츠 중계권':  'bg-blue-100 text-blue-700',
      '스포츠 OTT':     'bg-purple-100 text-purple-700',
      '스포츠 스타트업':'bg-green-100 text-green-700',
      '스포츠 기술':    'bg-orange-100 text-orange-700',
      '스포츠 데이터':  'bg-cyan-100 text-cyan-700',
      '스포츠 VR/AR':   'bg-pink-100 text-pink-700',
    };

    let allArticles      = [];
    let lastUpdatedAt    = '';
    let currentCategory  = '전체';
    let dispatchPending  = false;

    // ── PAT 관리 ───────────────────────────────────────────────
    const getToken = () => localStorage.getItem('gh_pat') || '';
    const storeToken = t => localStorage.setItem('gh_pat', t.trim());

    function showTokenPanel() {
      document.getElementById('setup-banner').classList.add('hidden');
      document.getElementById('token-panel').classList.remove('hidden');
      const inp = document.getElementById('token-input');
      inp.value = getToken();
      inp.focus();
    }
    function hideTokenPanel() {
      document.getElementById('token-panel').classList.add('hidden');
    }
    function toggleTokenPanel() {
      const panel = document.getElementById('token-panel');
      if (panel.classList.contains('hidden')) showTokenPanel();
      else hideTokenPanel();
    }
    function saveToken() {
      const val = document.getElementById('token-input').value.trim();
      storeToken(val);
      hideTokenPanel();
      if (val) {
        document.getElementById('setup-banner').classList.add('hidden');
        manualRefresh();
      }
    }

    // ── GitHub Actions 트리거 ──────────────────────────────────
    function isStale(updatedAtStr) {
      if (!updatedAtStr) return true;
      const m = updatedAtStr.match(/(\d{4}-\d{2}-\d{2} \d{2}:\d{2})/);
      if (!m) return true;
      const d = new Date(m[1].replace(' ', 'T') + '+09:00');
      return Date.now() - d.getTime() > STALE_MS;
    }

    async function triggerWorkflow() {
      const token = getToken();
      if (!token || dispatchPending) return;
      dispatchPending = true;
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ ref: 'main' }),
          }
        );
        if (res.status === 204) {
          document.getElementById('dispatch-status').classList.remove('hidden');
        } else {
          dispatchPending = false;
        }
      } catch {
        dispatchPending = false;
      }
    }

    async function manualRefresh() {
      dispatchPending = false;
      await triggerWorkflow();
    }

    // ── 뉴스 로드 & 폴링 ───────────────────────────────────────
    const RAW_URL = 'https://gomgomi23.github.io/sports-digest/data/news.json';

    async function loadNews(silent = false) {
      if (!silent) document.getElementById('sync-status').classList.remove('hidden');
      try {
        // 수집 대기 중에는 GitHub 원본을 직접 폴링 (로컬 파일은 갱신 안 됨)
        const url = dispatchPending
          ? RAW_URL + '?t=' + Date.now()
          : 'data/news.json?t=' + Date.now();
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const data = await res.json();

        const isNew = data.updated_at && data.updated_at !== lastUpdatedAt;
        if (isNew || !silent) {
          if (isNew && dispatchPending) {
            document.getElementById('dispatch-status').classList.add('hidden');
            dispatchPending = false;
          }
          lastUpdatedAt = data.updated_at || '';
          allArticles   = data.articles   || [];
          if (data.updated_at)
            document.getElementById('updated-at').textContent = '마지막 업데이트: ' + data.updated_at;
          const filtered = currentCategory === '전체'
            ? allArticles
            : allArticles.filter(a => a.category === currentCategory);
          render(filtered);
        }

        // 접속 시 stale이면 자동 수집 트리거
        if (!dispatchPending && isStale(data.updated_at)) triggerWorkflow();

      } catch {
        if (!silent) showEmpty();
      } finally {
        document.getElementById('sync-status').classList.add('hidden');
      }
    }

    // 평상시 5분 폴링 + 수집 대기 중엔 추가로 30초마다 체크
    setInterval(() => loadNews(true), POLL_MS);
    setInterval(() => { if (dispatchPending) loadNews(true); }, 30_000);

    // ── 카테고리 필터 ──────────────────────────────────────────
    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.tab').forEach(btn => {
        const active = btn.dataset.cat === cat;
        btn.classList.toggle('bg-blue-600', active);
        btn.classList.toggle('text-white',  active);
        btn.classList.toggle('bg-gray-100', !active);
        btn.classList.toggle('text-gray-600', !active);
      });
      const filtered = cat === '전체' ? allArticles : allArticles.filter(a => a.category === cat);
      render(filtered);
    }

    // ── 중복 그룹핑 ───────────────────────────────────────────
    function normalizeTitle(title) {
      return title.toLowerCase().replace(/[^\w가-힣]/g, '').slice(0, 30);
    }

    function groupArticles(articles) {
      const groups = [];
      const seen   = new Map();
      for (const a of articles) {
        const key = normalizeTitle(a.title);
        if (seen.has(key)) {
          seen.get(key).related.push(a);
        } else {
          const g = { main: a, related: [] };
          seen.set(key, g);
          groups.push(g);
        }
      }
      return groups;
    }

    // ── 렌더링 ────────────────────────────────────────────────
    function render(articles) {
      const container = document.getElementById('articles-container');
      const empty     = document.getElementById('empty-state');

      if (!articles.length) { container.innerHTML = ''; showEmpty(); return; }
      empty.classList.add('hidden');

      const groups = groupArticles(articles);
      document.getElementById('article-count').textContent = '총 ' + groups.length + '건';

      container.innerHTML = groups.map(({ main: a, related }) => `
        <article class="bg-white rounded-xl border border-gray-200 p-4 hover:border-blue-300 transition-colors">
          <div class="flex items-start gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${CATEGORY_BADGE[a.category] || 'bg-gray-100 text-gray-600'}">
                  ${a.category}
                </span>
                ${a.source ? `<span class="text-xs text-gray-400">${escHtml(a.source)}</span>` : ''}
                ${a.date   ? `<span class="text-xs text-gray-400">${escHtml(a.date)}</span>`   : ''}
              </div>
              <a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer"
                class="text-[15px] font-semibold text-gray-900 hover:text-blue-600 leading-snug">
                ${escHtml(a.title)}
              </a>
              ${related.length ? `
              <div class="mt-2 pt-2 border-t border-gray-100 space-y-1">
                ${related.map(r => `
                  <a href="${escHtml(r.url)}" target="_blank" rel="noopener noreferrer"
                    class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-blue-500 transition-colors">
                    <span class="shrink-0 w-1 h-1 rounded-full bg-gray-300"></span>
                    <span>${escHtml(r.source || '관련기사')} — ${escHtml(r.title)}</span>
                  </a>
                `).join('')}
              </div>` : ''}
            </div>
            <a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer"
              class="shrink-0 text-gray-300 hover:text-blue-500 transition-colors mt-0.5" title="원문 보기">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
            </a>
          </div>
        </article>
      `).join('');
    }

    function showEmpty() {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('article-count').textContent = '총 0건';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── 초기화 ────────────────────────────────────────────────
    if (!getToken()) document.getElementById('setup-banner').classList.remove('hidden');
    loadNews();
  </script>
</body>
</html>
